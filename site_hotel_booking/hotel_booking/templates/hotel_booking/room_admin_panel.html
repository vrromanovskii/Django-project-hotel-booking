<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Панель управелния номерами</title>
</head>
<body>
<li> <a href="{% url 'hotel_main_page' %}">На главную</a> </li>

<ul>

    {% endfor %}
</ul>
<a href="{% url 'add_room' %}">Добавить номер</a>
</body>
</html>
