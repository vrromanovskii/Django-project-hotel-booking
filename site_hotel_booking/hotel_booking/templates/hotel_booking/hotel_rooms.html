<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Номера отеля</title>
</head>
<body>
<li> <a href="{% url 'hotel_main_page' %}">На главную</a> </li>

<ul>
    {% for room in rooms %}
        <li>{{ room }} — Цена: {{ room.price }} руб.</li>
    <a href="{% url 'book_room' room_id=room.id %}">Забронировать</a>
    <a href="{% url 'bookings_list' room_id=room.id %}">Посмотреть бронирования</a><br><br>
    {% endfor %}
</ul>

</body>
</html>
